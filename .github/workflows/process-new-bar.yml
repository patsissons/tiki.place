name: Process new tiki bar issues

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: github.event.label.name == 'submission:new-bar'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Process issue
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_ACTIONS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: pnpm automation:new-bar

      - name: Commit data changes
        run: |
          if git diff --quiet -- data.yml; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.yml
          git commit -m "chore(data): process new tiki bar issue #${{ github.event.issue.number }}"
          git push
