name: Report invalid tiki bar record
description: Flag a record that may not actually be a tiki bar.
title: "Report invalid tiki bar record: "
labels:
  - record:report-bad
body:
  - type: input
    id: place-id
    attributes:
      label: Place ID
      description: The Google Place ID from data.yml.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Explain why this should be removed or reviewed.
    validations:
      required: true
