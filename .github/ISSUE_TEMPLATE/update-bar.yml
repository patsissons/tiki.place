name: Refresh tiki bar record
description: Request a Google Places refresh for an existing tiki bar record.
title: "Refresh tiki bar record: "
labels:
  - record:update
body:
  - type: input
    id: place-id
    attributes:
      label: Place ID
      description: The Google Place ID from data.yml.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Explain what appears stale or incorrect.
    validations:
      required: true
